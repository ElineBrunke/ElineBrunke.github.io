<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The COVID Development</title>
    <style>
        /* Center the title */
        h1 {
            text-align: center;
        }

        /* Author names style */
        .authors {
            text-align: center;
            font-size: smaller;
        }

        .column {
            float: left;
            width: 33.33%;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Clear floats after the columns */
        .row:after {
            content: "";
            display: table;
            clear: both;
        }

        /* Set the size of the iframe */
        .heatmap {
            width: 100%;
            height: 400px; /* Adjust height as needed */
            border: none; /* Remove iframe border */
        }
    </style>
</head>
<body>

<h1 style="font-size: 32px;">The COVID Development</h1>
<div class="authors">Aarhus, Eline Brunke & Østergaard, Karen Visby</div>

<div class="row">
    <div class="column" id="column1">
        <h2>Introduction</h2>
    </div>
    <div class="column" id="column2">
    </div>
    <div class="column" id="column3">
    </div>
</div>

<script>
    // Get the text content
    var text = `In the years 2020-2023 the corona virus spread all over the world, and the USA was no exception. This naturally lead to a large number of covid related hospitalizations, deaths and days with critically low staffing at the american hospitals. All this will be investigated further in this article, using several different data set from hospitals all across the states. To take the difference in american states population into account, population and density numbers are included and used to investigate a possible correlation between covid behavior and state density. 
    
The US was, like the remainder of the world, hit by covid     
    `;

    // Split the text into paragraphs
    var paragraphs = text.split("\n\n");

    // Calculate the number of paragraphs per column
    var paragraphsPerColumn = Math.ceil(paragraphs.length / 3);

    // Distribute paragraphs to columns
    var column1Content = paragraphs.slice(0, paragraphsPerColumn).join("<br>");
    var column2Content = paragraphs.slice(paragraphsPerColumn, paragraphsPerColumn * 2).join("<br>");
    var column3Content = paragraphs.slice(paragraphsPerColumn * 2).join("<br>");

    // Update the content of columns
    document.getElementById("column1").innerHTML += "<p>" + column1Content + "</p>";
    document.getElementById("column2").innerHTML += "<p>" + column2Content + "</p>";
    document.getElementById("column3").innerHTML += "<p>" + column3Content + "</p>";

    // Create iframe for heatmap
    var heatmapFrame = document.createElement("iframe");
    heatmapFrame.className = "heatmap";
    heatmapFrame.src = "/graphs/heatmap_with_time.html"; // Replace with the path to your heatmap HTML file
    document.getElementById("column1").appendChild(heatmapFrame);
</script>

</body>
</html>
