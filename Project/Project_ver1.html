<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three Columns with Heatmap</title>
    <style>
        .column {
            float: left;
            width: 33.33%;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Clear floats after the columns */
        .row:after {
            content: "";
            display: table;
            clear: both;
        }

        /* Set the size of the iframe */
        .heatmap {
            width: 100%;
            height: 400px; /* Adjust height as needed */
            border: none; /* Remove iframe border */
        }
    </style>
</head>
<body>

<div class="row">
    <div class="column" id="column1">
        <h2>Column 1</h2>
    </div>
    <div class="column" id="column2">
        <h2>Column 2</h2>
    </div>
    <div class="column" id="column3">
        <h2>Column 3</h2>
    </div>
</div>

<script>
    // Get the text content
    var text = `Weekly COVID-19 hospitalizations have hit their lowest level ever reported since the pandemic began, according to data from the Centers for Disease Control and Prevention.

    There were 5,615 COVID hospitalizations in the most recent week data that is available. In comparison, there were over 150,000 weekly admissions at the peak of the Omicron variant circulating in early 2022.
    
    "The significant decline in COVID-19 hospitalizations and deaths to these new lows is encouraging, showing that our public health measures and vaccination efforts have paid off," said Dr. John Brownstein, chief innovation officer at Boston Children’s Hospital and an ABC News medical contributor.
    
    Forecasts of new hospitalizations from the CDC indicate that admissions will likely remain stable for the next four weeks.
    
    "It’s important to continue monitoring for new variants and maintaining protective health behaviors to prevent possible surges," Brownstein added.`;

    // Split the text into paragraphs
    var paragraphs = text.split("\n\n");

    // Calculate the number of paragraphs per column
    var paragraphsPerColumn = Math.ceil(paragraphs.length / 3);

    // Distribute paragraphs to columns
    var column1Content = paragraphs.slice(0, paragraphsPerColumn).join("<br>");
    var column2Content = paragraphs.slice(paragraphsPerColumn, paragraphsPerColumn * 2).join("<br>");
    var column3Content = paragraphs.slice(paragraphsPerColumn * 2).join("<br>");

    // Update the content of columns
    document.getElementById("column1").innerHTML += "<p>" + column1Content + "</p>";
    document.getElementById("column2").innerHTML += "<p>" + column2Content + "</p>";
    document.getElementById("column3").innerHTML += "<p>" + column3Content + "</p>";

    // Create iframe for heatmap
    var heatmapFrame = document.createElement("iframe");
    heatmapFrame.className = "heatmap";
    heatmapFrame.src = "/graphs/heatmap_with_time.html"; // Replace with the path to your heatmap HTML file
    document.getElementById("column1").appendChild(heatmapFrame);
</script>

</body>
</html>
